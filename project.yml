name: MTADepartureBoard
options:
  bundleIdPrefix: io.lou
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
packages:
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf.git
    from: "1.28.0"
targets:
  MTADepartureBoard:
    type: application
    platform: iOS
    sources:
      - MTADepartureBoard
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: MTADepartureBoard/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: MTA Departure Board
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_EMIT_LOC_STRINGS: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.lou.subwayboard
        CODE_SIGN_ENTITLEMENTS: MTADepartureBoard/MTADepartureBoard.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          DEVELOPMENT_TEAM: 86GPYNC4TS
          PROVISIONING_PROFILE_SPECIFIER: match AppStore io.lou.subwayboard
    dependencies:
      - package: SwiftProtobuf
        product: SwiftProtobuf
      - target: MTADepartureBoardWidgetExtension
  MTADepartureBoardWidgetExtension:
    type: extensionkit-extension
    platform: iOS
    sources:
      - MTADepartureBoardWidget
      - path: MTADepartureBoard/Models
        name: SharedModels
      - path: MTADepartureBoard/Services/SharedDefaults.swift
        name: SharedDefaults
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: MTADepartureBoardWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: io.lou.subwayboard.widget
        CODE_SIGN_ENTITLEMENTS: MTADepartureBoardWidget/MTADepartureBoardWidget.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: MTA Departure Board Widget
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          DEVELOPMENT_TEAM: 86GPYNC4TS
          PROVISIONING_PROFILE_SPECIFIER: match AppStore io.lou.subwayboard.widget
