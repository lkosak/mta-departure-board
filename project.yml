name: SubwayBoard
options:
  bundleIdPrefix: io.lou
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
packages:
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf.git
    from: "1.28.0"
targets:
  SubwayBoard:
    type: application
    platform: iOS
    sources:
      - SubwayBoard
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: SubwayBoard/Info.plist
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_EMIT_LOC_STRINGS: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.lou.subwayboard
        CODE_SIGN_ENTITLEMENTS: SubwayBoard/SubwayBoard.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          DEVELOPMENT_TEAM: 86GPYNC4TS
          PROVISIONING_PROFILE_SPECIFIER: match AppStore io.lou.subwayboard
    dependencies:
      - package: SwiftProtobuf
        product: SwiftProtobuf
      - target: SubwayBoardWidgetExtension
  SubwayBoardWidgetExtension:
    type: extensionkit-extension
    platform: iOS
    sources:
      - SubwayBoardWidget
      - path: SubwayBoard/Models
        name: SharedModels
      - path: SubwayBoard/Services/SharedDefaults.swift
        name: SharedDefaults
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: SubwayBoardWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: io.lou.subwayboard.widget
        CODE_SIGN_ENTITLEMENTS: SubwayBoardWidget/SubwayBoardWidget.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: SubwayBoard Widget
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          DEVELOPMENT_TEAM: 86GPYNC4TS
          PROVISIONING_PROFILE_SPECIFIER: match AppStore io.lou.subwayboard.widget
