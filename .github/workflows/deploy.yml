name: TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen protobuf swift-protobuf

      - name: Generate proto files
        run: |
          mkdir -p SubwayBoard/Generated
          protoc --swift_out=SubwayBoard/Generated --proto_path=Proto Proto/gtfs-realtime.proto Proto/nyct-subway.proto

      - name: Generate Xcode project
        run: xcodegen generate

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - run: gem install fastlane -N

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CERTIFICATES_SSH_KEY }}

      - run: fastlane beta
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          BUILD_NUMBER: ${{ github.run_number }}
