name: Build & Upload to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install xcodegen protobuf swift-protobuf

      - name: Generate proto files
        run: |
          mkdir -p SubwayBoard/Generated
          protoc --swift_out=SubwayBoard/Generated --proto_path=Proto Proto/gtfs-realtime.proto Proto/nyct-subway.proto

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PASSWORD="actions"

          echo -n "$CERTIFICATE_P12" | base64 --decode > $CERT_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERT_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profiles
        env:
          APP_PROFILE: ${{ secrets.APP_PROVISIONING_PROFILE }}
          WIDGET_PROFILE: ${{ secrets.WIDGET_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          echo -n "$APP_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/app.mobileprovision
          echo -n "$WIDGET_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/widget.mobileprovision

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project SubwayBoard.xcodeproj \
            -scheme SubwayBoard

      - name: Build archive
        run: |
          xcodebuild archive \
            -project SubwayBoard.xcodeproj \
            -scheme SubwayBoard \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/SubwayBoard.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -allowProvisioningUpdates

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>destination</key>
              <string>upload</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>io.lou.subwayboard</key>
                  <string>app.mobileprovision</string>
                  <key>io.lou.subwayboard.widget</key>
                  <string>widget.mobileprovision</string>
              </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/SubwayBoard.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Upload to App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: |
          KEY_PATH=$RUNNER_TEMP/asc_key.p8
          echo -n "$ASC_API_KEY" | base64 --decode > $KEY_PATH

          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/SubwayBoard.ipa \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
